# Nalarbanjir — Model Configuration v2.0
# Hydrophysics + AI flood prediction for Indonesia

app:
  name: nalarbanjir
  version: "2.0.0"
  description: "Hydrophysics + AI flood prediction for Indonesia"

# ── Physics ────────────────────────────────────────────────────────────────
physics:
  gravity: 9.81
  default_mode: "2d"   # '1d' | '2d' | '1d2d'

  solver_1d:
    theta: 0.6          # Preissmann weight: 0.5=centered, 1.0=fully implicit
    dt: 10.0            # [s] implicit allows large dt
    tolerance: 1.0e-6   # Newton-Raphson convergence tolerance
    max_iterations: 50
    default_manning_n: 0.03

  solver_2d:
    dt: 1.0             # [s] auto-adjusted by CFL condition
    cfl: 0.9            # Courant-Friedrichs-Lewy safety factor
    dx: 100.0           # [m] cell size x
    dy: 100.0           # [m] cell size y
    nx: 100             # number of cells x
    ny: 100             # number of cells y
    min_depth: 0.001    # [m] wet/dry threshold
    domain_x: 10000.0   # [m] total domain width
    domain_y: 10000.0   # [m] total domain height

  coupling:
    weir_coefficient: 0.4    # broad-crested weir Cd
    sync_interval: 1         # exchange every N 2D steps

# ── Terrain & Land Use ─────────────────────────────────────────────────────
terrain:
  initial_water_depth: 0.0   # [m] uniform initial condition
  amplitude: 2.0             # [m] synthetic DEM amplitude
  wavelength: 2000.0         # [m] synthetic DEM wavelength

  manning_n:
    water:        0.025
    urban:        0.015
    agricultural: 0.035
    forest:       0.100
    wetland:      0.050
    open_land:    0.030

  flood_thresholds:           # [m] water depth thresholds
    minor:    0.3
    moderate: 1.0
    major:    2.0
    severe:   5.0

  land_use:
    water:        {permeability: 0.1, vulnerability: 5}
    urban:        {permeability: 0.3, vulnerability: 3}
    agricultural: {permeability: 0.6, vulnerability: 2}
    forest:       {permeability: 0.7, vulnerability: 3}
    wetland:      {permeability: 0.8, vulnerability: 4}
    open_land:    {permeability: 0.5, vulnerability: 2}

# ── Rainfall ───────────────────────────────────────────────────────────────
rainfall:
  default_type: "uniform"    # 'uniform' | 'storm_cell' | 'frontal'
  default_intensity: 0.0     # [m/s]
  storm_cell:
    sigma: 2000.0            # [m] Gaussian spread

# ── Machine Learning ───────────────────────────────────────────────────────
ml:
  model_type: "flood_net"
  checkpoint_path: "ml/checkpoints/floodnet_v2.pt"

  architecture:
    input_features: 10
    output_features: 5
    hidden_dims: [64, 128, 256]
    n_heads: 4
    dropout: 0.1

  training:
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
    patience: 10
    validation_split: 0.2

  inference:
    mc_dropout_passes: 50    # Monte Carlo Dropout for UQ
    batch_size: 256

# ── Simulation ─────────────────────────────────────────────────────────────
simulation:
  total_steps: 1000
  save_every: 100
  log_every: 10
  broadcast_interval: 5      # emit WebSocket update every N steps

# ── API ────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]
  websocket:
    url: "/ws"
    heartbeat_interval: 30   # [s]
    max_connections: 100

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  files:
    simulation: "logs/simulation.log"
    errors:     "logs/errors.log"
    access:     "logs/access.log"

# ── Data ───────────────────────────────────────────────────────────────────
data:
  storage:
    primary: "data/primary"
    archive: "data/archive"
  formats: ["json", "csv", "netcdf", "hdf5"]

# ── Performance ────────────────────────────────────────────────────────────
performance:
  limits:
    max_memory_gb: 4
    max_cpu_percent: 80
    max_connections: 1000
  caching: true
