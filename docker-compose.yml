# ─── Nalarbanjir — production compose ────────────────────────────────────────
# Services:
#   api       — Python FastAPI backend (port 8000)
#   frontend  — Angular 20 SPA served by nginx (port 80)
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached
#   docker compose logs -f api         # tail api logs

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nalarbanjir-api
    ports:
      - "8000:8000"
    volumes:
      - api_logs:/app/logs
      - api_data:/app/data
    environment:
      - PYTHONPATH=/app
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/api/health',timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nalarbanjir-net

  # ── Angular frontend + nginx reverse proxy ───────────────────────────────
  frontend:
    build:
      context: nalarbanjir-ui
      dockerfile: Dockerfile
    container_name: nalarbanjir-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nalarbanjir-net

networks:
  nalarbanjir-net:
    driver: bridge

volumes:
  api_logs:
  api_data:
