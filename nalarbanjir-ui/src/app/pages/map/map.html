<div class="workspace">

  <!-- ── Three.js canvas (fills everything) ───────────────────────────── -->
  <app-terrain-viewer class="canvas-host"></app-terrain-viewer>

  <!-- ── Top toolbar ──────────────────────────────────────────────────── -->
  <header class="hud toolbar">
    <span class="brand">Nalarbanjir</span>
    <div class="toolbar__actions">
      <button class="hud-btn" [class.hud-btn--active]="showLayers()" (click)="showLayers.set(!showLayers())">
        ⊞ Layers
      </button>
      <button class="hud-btn" [class.hud-btn--active]="showSimulation()" (click)="showSimulation.set(!showSimulation())">
        ▶ Simulation
      </button>
    </div>

    <!-- Project name + save/load -->
    <div class="toolbar__project">
      <input class="project-name" type="text"
             [value]="projectName()" (change)="projectName.set($any($event.target).value)"
             title="Project name" />
      <button class="hud-btn" (click)="exportProject()" title="Export project as JSON">
        ↓ Save
      </button>
      <label class="hud-btn" title="Import project from JSON">
        ↑ Load
        <input type="file" accept=".json,.nalarbanjir.json" style="display:none"
               (change)="importProject($event)" />
      </label>
      @if (projectMsg()) {
        <span class="project-msg">{{ projectMsg() }}</span>
      }
    </div>

    <div class="toolbar__right">
      <span class="sim-time">{{ simStore.formattedTime() }}</span>
      <span class="sim-step">{{ simStore.formattedStep() }}</span>
    </div>
  </header>

  <!-- ── Layer panel (left) ────────────────────────────────────────────── -->
  @if (showLayers()) {
    <aside class="hud panel-left">
      <app-layer-panel></app-layer-panel>
    </aside>
  }

  <!-- ── Simulation panel (right) ─────────────────────────────────────── -->
  @if (showSimulation()) {
    <aside class="hud panel-right">
      <app-simulation-panel></app-simulation-panel>
    </aside>
  }

  <!-- ── 1D River profile (bottom) ─────────────────────────────────────── -->
  @if (channelData()) {
    <div class="hud channel-host">
      <div class="channel-header">
        <span class="channel-title">River Profile (1D)</span>
      </div>
      <app-channel-profile [data]="channelData()"></app-channel-profile>
    </div>
  }

  <!-- ── Inspector (click-to-query, bottom-centre) ────────────────────── -->
  @if (pickEvent()) {
    <div class="hud inspector-host">
      <app-inspector-panel [event]="pickEvent()!" (close)="pickEvent.set(null)">
      </app-inspector-panel>
    </div>
  }

</div>
