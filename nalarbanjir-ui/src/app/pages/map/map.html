<div class="workspace">

  <!-- ── Three.js canvas (fills everything) ───────────────────────────── -->
  <app-terrain-viewer class="canvas-host"></app-terrain-viewer>

  <!-- ── Top toolbar ──────────────────────────────────────────────────── -->
  <header class="hud toolbar">
    <span class="brand">Nalarbanjir</span>
    <div class="toolbar__actions">
      <button class="hud-btn" [class.hud-btn--active]="showLayers()" (click)="showLayers.set(!showLayers())">
        ⊞ Layers
      </button>
      <button class="hud-btn" [class.hud-btn--active]="showSimulation()" (click)="showSimulation.set(!showSimulation())">
        ▶ Simulation
      </button>
    </div>
    <div class="toolbar__right">
      <span class="sim-time">{{ simStore.formattedTime() }}</span>
      <span class="sim-step">{{ simStore.formattedStep() }}</span>
    </div>
  </header>

  <!-- ── Layer panel (left) ────────────────────────────────────────────── -->
  @if (showLayers()) {
    <aside class="hud panel-left">
      <app-layer-panel></app-layer-panel>
    </aside>
  }

  <!-- ── Simulation panel (right) ─────────────────────────────────────── -->
  @if (showSimulation()) {
    <aside class="hud panel-right">
      <app-simulation-panel></app-simulation-panel>
    </aside>
  }

  <!-- ── Inspector (click-to-query, bottom-centre) ────────────────────── -->
  @if (pickEvent()) {
    <div class="hud inspector-host">
      <app-inspector-panel [event]="pickEvent()!" (close)="pickEvent.set(null)">
      </app-inspector-panel>
    </div>
  }

</div>
